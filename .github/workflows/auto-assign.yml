name: Auto-assign new issues

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions:
  issues: write          # ✅ needed to assign issues
  pull-requests: write   # ✅ needed to request reviewers

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-assign issue or PR
        uses: actions/github-script@v7
        with:
          script: |
            const assignees = ['BouglaceMarouane', 'aymen-afamm'];
            const number = context.payload.issue?.number || context.payload.pull_request?.number;
            const assigned = [assignees[number % 2]];
            const isIssue = !!context.payload.issue;

            if (isIssue) {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number,
                assignees: assigned
              });
            } else {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: number,
                reviewers: assignees.filter(u => u !== assigned[0])
              });
            }
